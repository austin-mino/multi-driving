// 마우스/터치 드래그 상태 저장
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let camAzimuthStart = camAzimuth;
let camElevationStart = camElevation;

// 마우스 이벤트 핸들러
function onPointerDown(event) {
  if (cameraMode === 'free') {
    isDragging = true;
    dragStart.x = event.clientX;
    dragStart.y = event.clientY;
    camAzimuthStart = camAzimuth;
    camElevationStart = camElevation;
  }
}
function onPointerMove(event) {
  if (isDragging && cameraMode === 'free') {
    const deltaX = event.clientX - dragStart.x;
    const deltaY = event.clientY - dragStart.y;

    const rotationSpeed = 0.05;

    camAzimuth = camAzimuthStart - deltaX * rotationSpeed;
    camElevation = camElevationStart - deltaY * rotationSpeed;

    camElevation = Math.min(Math.max(camElevation, 0.1), Math.PI - 0.1);
  }
}
  
function onPointerUp(event) {
  isDragging = false;
}

function resetCar() {
  // 위치는 그대로, 높이 약간 위로
  const pos = chassisBody.position;
  chassisBody.position.set(pos.x, pos.y + 1.5, pos.z);

  // 회전 초기화
  const yRot = getYRotation(chassisBody.quaternion);
  chassisBody.quaternion.setFromEuler(0, yRot, 0);

  // 속도 초기화
  chassisBody.velocity.set(0, 0, 0);
  chassisBody.angularVelocity.set(0, 0, 0);
}

// 쿼터니언에서 y축 회전값 추출
function getYRotation(q) {
  const siny_cosp = 2 * (q.w * q.y + q.z * q.x);
  const cosy_cosp = 1 - 2 * (q.y * q.y + q.z * q.z);
  return Math.atan2(siny_cosp, cosy_cosp);
}


  function makeAsphaltTexture() {
  const c = document.createElement('canvas');
  c.width = 128;
  c.height = 128;

  const ctx = c.getContext('2d');
  ctx.fillStyle = '#303030';
  ctx.fillRect(0, 0, c.width, c.height);

  for (let i = 0; i < 900; i++) {
    const v = 35 + Math.random() * 35 | 0;
    ctx.fillStyle = `rgb(${v},${v},${v})`;
    ctx.fillRect(Math.random() * c.width, Math.random() * c.height, 1, 1);
  }

  const t = new THREE.CanvasTexture(c);
  t.wrapS = THREE.RepeatWrapping;
  t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(8, 8);
  return t;
}

function makeSidewalkTexture() {
  const c = document.createElement('canvas');
  c.width = 128;
  c.height = 128;

  const ctx = c.getContext('2d');
  ctx.fillStyle = '#8c8c8c';
  ctx.fillRect(0, 0, c.width, c.height);

  ctx.strokeStyle = '#777777';
  ctx.lineWidth = 2;

  for (let i = 0; i <= 128; i += 32) {
    ctx.beginPath();
    ctx.moveTo(i, 0);
    ctx.lineTo(i, 128);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0, i);
    ctx.lineTo(128, i);
    ctx.stroke();
  }

  const t = new THREE.CanvasTexture(c);
  t.wrapS = THREE.RepeatWrapping;
  t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(4, 4);
  return t;
}

  function makeBuildingTexture(hexColor, floors = 8, cols = 4) {
  const w = 256;
  const h = 512;
  const c = document.createElement('canvas');
  c.width = w;
  c.height = h;

  const ctx = c.getContext('2d');
  const r = (hexColor >> 16) & 255;
  const g = (hexColor >> 8) & 255;
  const b = hexColor & 255;

  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, w, h);

  const floorH = h / floors;
  const colW = w / cols;

  for (let y = 0; y < floors; y++) {
    for (let x = 0; x < cols; x++) {
      const lit = Math.random() > 0.35;
      ctx.fillStyle = lit ? '#ffe8a3' : '#233044';
      ctx.fillRect(
        x * colW + colW * 0.22,
        y * floorH + floorH * 0.22,
        colW * 0.48,
        floorH * 0.42
      );
    }
  }

  const t = new THREE.CanvasTexture(c);
  t.wrapS = THREE.RepeatWrapping;
  t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(1, 1);
  return t;
}

function seededRandom(seed) {
  const x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

let seedCounter = 0;
function rng() {
  return seededRandom(++seedCounter);
}

// 실제 도시형 지형: 중심 평지 + 긴 오르막 + 외곽 언덕
function terrainH(nx, nz) {
  const dist = Math.sqrt(nx * nx + nz * nz);
  const flatStart = Math.max(0, 1 - dist / 240);

  const longUphill = Math.max(0, nz + 120) * 0.018;
  const sideSlope = nx * 0.007;

  const hillA = 24 * Math.exp(-((nx - 380) ** 2 + (nz + 160) ** 2) / 110000);
  const hillB = 18 * Math.exp(-((nx + 430) ** 2 + (nz - 280) ** 2) / 150000);
  const hillC = 12 * Math.exp(-((nx - 120) ** 2 + (nz - 540) ** 2) / 95000);

  const smallNoise =
    Math.sin(nx * 0.008) * 2.8 +
    Math.cos(nz * 0.007) * 2.4 +
    Math.sin((nx + nz) * 0.014) * 1.5;

  const h = longUphill + sideSlope + hillA + hillB + hillC + smallNoise;
  return h * (1 - flatStart * 0.96);
}

function groundY(x, z) {
  return terrainH(x, z) - 5;
}

    const nz = (zi / TERRAIN_SEGS - 0.5) * TERRAIN_SIZE;
    heightData[xi][zi] = terrainH(nx, nz);
  }
}

}

}

function createSidewalkBlock(x, z) {
  const y = groundY(x, z);
  const size = BLOCK_SIZE - ROAD_WIDTH;

  const sw = new THREE.Mesh(sidewalkGeo, sidewalkMat);
  sw.position.set(x, y + 0.18, z);
  sw.receiveShadow = true;
  roadGroup.add(sw);

  for (const side of [-1, 1]) {
    const curbH = new THREE.Mesh(curbGeoH, curbMat);
    curbH.position.set(x, y + 0.24, z + side * (size / 2));
    roadGroup.add(curbH);

    const curbV = new THREE.Mesh(curbGeoV, curbMat);
    curbV.position.set(x + side * (size / 2), y + 0.24, z);

function addLaneMarkings(x, z) {
  const y = groundY(x, z) + 0.13;

  for (let d = -BLOCK_SIZE / 2 + 10; d < BLOCK_SIZE / 2; d += 18) {
    const mz = new THREE.Mesh(laneDashGeoZ, yellowMat);
    mz.position.set(x, y, z + d);
    roadGroup.add(mz);

    const mx = new THREE.Mesh(laneDashGeoX, yellowMat);
    mx.position.set(x + d, y + 0.005, z);
    roadGroup.add(mx);
  }
}

function addCrosswalk(x, z) {
  const half = BLOCK_SIZE / 2;
  const count = 5;
  const stripeW = 1.5;
  const totalW = count * stripeW * 2;
  const startOff = -totalW / 2 + stripeW / 2;

  for (let i = 0; i < count; i++) {
    const off = startOff + i * stripeW * 2;

    let y = groundY(x, z - half + ROAD_WIDTH / 2) + 0.16;
    const s1 = new THREE.Mesh(crossGeoZ, laneMat);
    s1.position.set(x + off, y, z - half + ROAD_WIDTH / 2);
    roadGroup.add(s1);

    y = groundY(x, z + half - ROAD_WIDTH / 2) + 0.16;
    const s2 = new THREE.Mesh(crossGeoZ, laneMat);
    s2.position.set(x + off, y, z + half - ROAD_WIDTH / 2);
    roadGroup.add(s2);

    y = groundY(x - half + ROAD_WIDTH / 2, z) + 0.16;
    const s3 = new THREE.Mesh(crossGeoX, laneMat);
    s3.position.set(x - half + ROAD_WIDTH / 2, y, z + off);
    roadGroup.add(s3);

    y = groundY(x + half - ROAD_WIDTH / 2, z) + 0.16;
    const s4 = new THREE.Mesh(crossGeoX, laneMat);
    s4.position.set(x + half - ROAD_WIDTH / 2, y, z + off);
    roadGroup.add(s4);
  }
}

function createBuilding(x, z, isCentral = false) {
  const maxArea = BLOCK_SIZE - ROAD_WIDTH - 10;
  const w = 22 + rng() * (maxArea - 22);
  const d = 22 + rng() * (maxArea - 22);

  const baseHeight = isCentral ? 55 : 24;
  const extraHeight = isCentral ? 145 : 85;
  const h = baseHeight + rng() * extraHeight;

  const mat = buildingMatPoolGlobal[
    Math.floor(rng() * buildingMatPoolGlobal.length)
  ];

  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, mat);

  const y = groundY(x, z);
  mesh.position.set(x, y + h / 2, z);
  mesh.castShadow = isCentral || h > 80;
  mesh.receiveShadow = true;
  buildingGroup.add(mesh);

  const body = new CANNON.Body({ mass: 0 });
  body.addShape(new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2)));
  body.position.set(x, y + h / 2, z);
  world.addBody(body);

  addRooftopDetails(x, z, y, w, d, h);
}

function addRooftopDetails(x, z, baseY, w, d, h) {
  const roofY = baseY + h;
  const grayMat = new THREE.MeshStandardMaterial({
    color: 0x777777,
    roughness: 0.85
  });

  const acCount = 1 + Math.floor(rng() * 3);
  for (let i = 0; i < acCount; i++) {
    const ac = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.8, 1.2), grayMat);
    ac.position.set(
      x + (rng() - 0.5) * w * 0.65,
      roofY + 0.4,
      z + (rng() - 0.5) * d * 0.65
    );
    buildingGroup.add(ac);
  }

  if (rng() > 0.55) {
    const stair = new THREE.Mesh(
      new THREE.BoxGeometry(4 + rng() * 3, 3 + rng() * 2, 4 + rng() * 3),
      grayMat
    );
    stair.position.set(
      x + (rng() - 0.5) * w * 0.45,
      roofY + 1.6,
      z + (rng() - 0.5) * d * 0.45
    );
    buildingGroup.add(stair);
  }
}

function createPark(x, z) {

  path1.position.set(x, y + 0.16, z);

  const path2 = new THREE.Mesh(new THREE.BoxGeometry(size, 0.1, 3.5), dirtMat);
  path2.position.set(x, y + 0.17, z);
  parkGroup.add(path2);

  for (let i = 0; i < 6; i++) {
    const tx = x + (rng() - 0.5) * (size - 12);

  });

function addStreetProps(x, z) {
  const half = (BLOCK_SIZE - ROAD_WIDTH) / 2 - 3;
  const spots = [
    [x + half, z + half],
    [x - half, z + half],
    [x + half, z - half],
    [x - half, z - half]
  ];

  for (const [px, pz] of spots) {
    const r = rng();

    if (r < 0.22) {
      createStreetLight(px, pz);
    } else if (r < 0.48) {
      createTree(px, pz);
    } else if (r < 0.7) {
      const y = groundY(px, pz);
      const bin = new THREE.Mesh(binGeo, binMat);
      bin.position.set(px, y + 0.42, pz);
      propGroup.add(bin);
    }
  }
}

function createSportsCar(color = '#ffffff') {
  return new Promise((resolve) => {
    gltfLoader.load(
      'https://threejs.org/examples/models/gltf/ferrari.glb',
      (gltf) => {
        const car = gltf.scene;
        steeringWheelNode = null; // 헨들 조정 초기화

        car.traverse((child) => {
          // 핸들은 Mesh가 아닐 수도 있으므로 isMesh 체크를 아래로 이동하거나 이름 체크를 먼저 합니다.
          if (child.name === 'steering_wheel') {
            steeringWheelNode = child;
          }

          if (!child.isMesh) return;
          
          if (child.name === 'body') {
            child.material = new THREE.MeshStandardMaterial({
              color: color,
              metalness: 0.8,
              roughness: 0.2,
            });
            child.name = 'MainBody'; // 멀티플레이 색상 동기화용
          } else if (child.name === 'glass') {
            child.material = new THREE.MeshStandardMaterial({
              color: 0x223344,
              transparent: true,
              opacity: 0.4,
              roughness: 0.05,
            });
          } else if (child.name.startsWith('rim')) {
            child.material = new THREE.MeshStandardMaterial({
              color: 0xcccccc,
              metalness: 0.9,
              roughness: 0.1,
            });
          }
          child.castShadow = true;
          child.receiveShadow = true;
        });

        car.scale.set(2.5, 2.5, 2.5);
        car.rotation.y = Math.PI;
        carVisualOffsetY = -0.8;

        // ─── Ferrari 바퀴 노드 추출 ───────────────────────────────
        // 모델 내 바퀴 부모 노드: wheel_fl, wheel_fr, wheel_rl, wheel_rr

  rpm = calculateRPM(speed, delta);
  updateGearAuto(delta);

  if (input.accel && !isShifting) {
    const rpmFactor = rpm / maxRPM;

    let torqueCurve;
    if (rpmFactor < 0.25) {
      torqueCurve = 0.4 + rpmFactor * 2.4;
    } else if (rpmFactor < 0.75) {
      torqueCurve = 1.0;
    } else {
      torqueCurve = 1.0 - (rpmFactor - 0.75) * 1.2;
    }

const gearRatio = gearRatios[currentGear] * finalDrive;
const torque = maxEngineForce * torqueCurve / gearRatios[currentGear];
engineForce = Math.min(torque, maxEngineForce * 0.9);

const drag = 0.003 * speed * speed;
engineForce -= drag;
engineForce = Math.max(-8000, Math.min(engineForce, 8000));

  } else if (isShifting) {
    engineForce = 0;
  }

  applyBrake(input.brake ? maxBrakeForce : 0);
}
else if (gearState === 'R') {
  if (input.accel) engineForce = -maxEngineForce * 0.6;
  if (input.brake) applyBrake(maxBrakeForce);
  else applyBrake(0);

} else if (gearState === 'N') {
  applyBrake(input.brake ? maxBrakeForce : 0);

} else if (gearState === 'P') {
  applyBrake(maxBrakeForce * 1.5);
}


// 마지막 (이건 항상 맨 끝)
vehicle.applyEngineForce(engineForce, 2);
vehicle.applyEngineForce(engineForce, 3);

if (input.handbrake) {

    // 카메라 차량 뒤쪽 위치로 고정
   function updateCamera() {
  const carPos = interpolatedCarPosition.clone();
  
  // 1. 기본 오프셋 설정 (차량 뒤쪽 위)
  const offset = new THREE.Vector3(0, 6, 14);
  
  // 2. 조향에 따른 카메라 쏠림 효과 (원심력 표현)
  // steeringValue가 왼쪽(-)이면 카메라는 오른쪽(+)으로 살짝 이동
  const steeringLean = -steeringValue * 5; 
  offset.x += steeringLean;
  
  // 3. 속도에 따른 거리 조절 (속도가 빠르면 카메라가 더 멀어짐)
  const speed = getSpeedKmH();
  const speedFactor = Math.min(speed / 200, 1);
  offset.z += speedFactor * 4;
  offset.y += speedFactor * 1.5;

  offset.applyQuaternion(interpolatedCarQuaternion);
  const targetPos = carPos.clone().add(offset);

  // 4. 부드러운 위치 보간 (너무 딱딱하지 않게)
  camera.position.lerp(targetPos, 0.15);
  
  // 5. 시선 보간 (차량의 약간 앞쪽을 바라보게 하여 더 역동적으로)
  const lookAtOffset = new THREE.Vector3(0, 1, -5);
  lookAtOffset.applyQuaternion(interpolatedCarQuaternion);
  const lookAtTarget = carPos.clone().add(lookAtOffset);
  
  // 현재 카메라가 보고 있는 방향에서 목표 방향으로 부드럽게 회전
  const currentLookAt = new THREE.Vector3();
  camera.getWorldDirection(currentLookAt);
  const targetLookAt = lookAtTarget.clone().sub(camera.position).normalize();
  
  camera.lookAt(lookAtTarget);
}

   function updateFirstPersonCamera() {
  // 차종별 운전석 위치
  let offset;
  if (currentCarModel === 'SUV') {
    offset = new THREE.Vector3(0, 3.5, 4); // Range Rover 운전석
  } else if (currentCarModel === 'SportsCar') {
    offset = new THREE.Vector3(-0.85, 2.5, -0.25); // Ferrari
  } else if (currentCarModel === 'McLarenP1') {
    offset = new THREE.Vector3(-0.85, 2.5, -0.25); // mclaren
  } else {
    offset = new THREE.Vector3(-0.85, 2.5, -0.4); // 그랜저 기본
  }

  // 1인칭 흔들림 효과 (G-Force 표현)
  const speed = getSpeedKmH();
  const speedFactor = speed / 100;
  const shake = Math.sin(Date.now() * 0.01) * 0.0041618 * speedFactor;
  offset.y += shake;
  offset.x += -steeringValue * 0.5; // 조향 시 몸이 쏠리는 효과

  offset.applyQuaternion(interpolatedCarQuaternion);
  camera.position.copy(interpolatedCarPosition).add(offset);

  const forward = new THREE.Vector3(0, 0, -1);
  // 시선도 조향 방향으로 살짝 미리 보게 함
  const lookRotation = interpolatedCarQuaternion.clone();
  const steeringQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), -steeringValue * 0.3);
  lookRotation.multiply(steeringQuat);
  
  forward.applyQuaternion(lookRotation);

  const lookAt = camera.position.clone().add(forward.multiplyScalar(20));
  camera.lookAt(lookAt);
}

      if (!chassisBody.previousPosition) {

        chassisBody.previousQuaternion = new THREE.Quaternion(chassisBody.quaternion.x, chassisBody.quaternion.y, chassisBody.quaternion.z, chassisBody.quaternion.w);
      } else {
        chassisBody.previousPosition.set(chassisBody.position.x, chassisBody.position.y, chassisBody.position.z);
        chassisBody.previousQuaternion.set(chassisBody.quaternion.x, chassisBody.quaternion.y, chassisBody.quaternion.z, chassisBody.quaternion.w);
      }

  // 물리 시뮬레이션 스텝
      const currentTime = performance.now();
      let deltaTime = (currentTime - lastCallTime) / 1000;
      lastCallTime = currentTime;

      // 최대 deltaTime 제한 (탭 이동 시 멈춤 방지)
      deltaTime = Math.min(deltaTime, 0.1);

      accumulator += deltaTime;

      while (accumulator >= fixedTimeStep) {
        updateVehicleControls(fixedTimeStep);
        world.step(fixedTimeStep);
        accumulator -= fixedTimeStep;
      }

      const alpha = accumulator / fixedTimeStep;

  // 물리 바디의 위치를 Three.js Vector3로 변환
  const currentPos = new THREE.Vector3(chassisBody.position.x, chassisBody.position.y, chassisBody.position.z);
  const currentQuat = new THREE.Quaternion(chassisBody.quaternion.x, chassisBody.quaternion.y, chassisBody.quaternion.z, chassisBody.quaternion.w);

  // 시각적 끊김 감소를 위한 보간 적용
  carModel.position.lerpVectors(chassisBody.previousPosition, currentPos, alpha);
  carModel.position.y += carVisualOffsetY;
  carModel.quaternion.slerpQuaternions(chassisBody.previousQuaternion, currentQuat, alpha);

  interpolatedCarPosition.copy(carModel.position);
  interpolatedCarQuaternion.copy(carModel.quaternion);

      // 휠 mesh 위치/회전 업데이트
      for (let i = 0; i < vehicle.wheelInfos.length; i++) {

        wheelHolders[i].position.copy(t.position);
        wheelHolders[i].quaternion.copy(t.quaternion);
      }

      // 실제 핸들 회전 시스템 (1인칭 시점에서만 업데이트하여 최적화)
    // 매 프레임마다 시각값이 물리값을 느리게 추적
visualSteeringLag += (steeringValue - visualSteeringLag) * 0.1;

if (steeringWheelNode && cameraMode === 'first') {
  steeringWheelNode.rotation.y = visualSteeringLag * 15.0;
}
      // ─── GLTF/GLB 모델 바퀴 노드 회전 업데이트 ───────────────────────────
      // carWheelNodes[i]는 모델 내부 바퀴 부모 노드를 가리킨다.
      // CANNON의 worldTransform.quaternion에서 차체 회전을 제거하여
      // 로컬 공간의 바퀴 회전을 추출한 뒤 모델 노드에 적용한다.
      if (carModel && carWheelNodes.some(n => n !== null)) {
        const carInvQuat = carModel.quaternion.clone().invert();

       for (let i = 0; i < 4; i++) {
  const node = carWheelNodes[i];
  if (!node) continue;

  vehicle.updateWheelTransform(i);
  const wt = vehicle.wheelInfos[i].worldTransform;

  // 세계 쿼터니언에서 차체 회전 제거 -> 로컬 회전
  const localQuat = carInvQuat.clone().multiply(
    new THREE.Quaternion(wt.quaternion.x, wt.quaternion.y, wt.quaternion.z, wt.quaternion.w)
  );

  // 1. 물리 엔진이 계산한 실제 조향각(Steering) 가져오기
  const physicsSteering = vehicle.wheelInfos[i].steering;

  // 2. 물리 기준의 조향 쿼터니언 생성 (Y축 회전)
  const physicsSteeringQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), physicsSteering);

  // 3. 전체 로컬 회전에서 조향 성분을 빼버려서, '순수하게 바퀴가 굴러가는 회전(Roll)'만 추출
  const rollingQuat = physicsSteeringQuat.clone().invert().multiply(localQuat);

  // 4. 우리가 원하는 시각적 조향각 계산 (SUV 반전 및 앞바퀴 증폭)
  let visualSteering = physicsSteering;
  const exaggerationFactor = 2.6; //원하는 꺾임 배율

  if (currentCarModel.includes('SUV') || currentCarModel.includes('McLarenP1')) {
    // 레인지로버(SUV)는 조향 축 방향이 반대이므로 마이너스(-) 처리
    if (i === 0 || i === 1) {
      visualSteering = -physicsSteering * exaggerationFactor; 
    } else {
      visualSteering = -physicsSteering; 
    }
  } else {
    // 다른 일반 차량들 (McLaren 포함)
    if (i === 0 || i === 1) {
      visualSteering = physicsSteering * exaggerationFactor;  
    }
  }

  // 5. 새로 계산된 시각적 조향 쿼터니언 생성
  const visualSteeringQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), visualSteering);

  // 6. 새로운 조향값과 아까 추출해 둔 '순수 구름 회전(Roll)'을 결합하여 localQuat를 최종 업데이트
  localQuat.copy(visualSteeringQuat.multiply(rollingQuat));
  
  // ─── 모델별 맞춤형 축 보정 ─────────────────────────────
  let correctionQuat = new THREE.Quaternion();
  if (currentCarModel.includes('SportsCar')) {
    correctionQuat.setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0));
  } else if (currentCarModel.includes('SUV')) {
    correctionQuat.setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0));
  } else if (currentCarModel.includes('McLarenP1')) {
    // ✨ McLaren 축 보정 추가
    correctionQuat.setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0));
  }

  const finalQuat = localQuat.clone().multiply(correctionQuat);
  const euler = new THREE.Euler().setFromQuaternion(finalQuat, 'YXZ');

  // 공통 반전 처리
  euler.x = -euler.x; 
  if (currentCarModel.includes('SUV')) {
    euler.y = euler.y;
  } else {
    euler.y = -euler.y;
  }
  
  // ─── 최종 회전 적용 ─────────────────────────────
  if (currentCarModel.includes('McLarenP1')) {
    // ✨ McLaren은 여기서 왼쪽 바퀴를 180도 뒤집고 쿼터니언으로 바로 적용
    let mclarenQuat = finalQuat.clone();
    if (node.userData.side === 'L') {
      const LEFT_SIDE_INVERSION = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI);
      mclarenQuat.multiply(LEFT_SIDE_INVERSION);
    }
    node.quaternion.copy(mclarenQuat);

  } else if (currentCarModel.includes('SUV')) {  
    node.quaternion.copy(node.userData.baseQuaternion.clone().multiply(finalQuat));
  } else {
    node.quaternion.setFromEuler(euler);
  }
  
  // 강제 행렬 업데이트
  node.updateMatrix();
}
      }

       // 상대방 차량 위치 보간 처리
      
  const now = performance.now();
// 상대방 차량 위치 보간 처리
// 상대방 차량 위치 및 회전 업데이트 (부드러운 보간)
for (const id in otherPlayers) {
    const pData = otherPlayers[id];
    
    // 로딩 중이거나 모델이 아직 없는 경우 건너뜀
    if (pData.loading || !pData.model) continue;

    // 1. 차체 위치/회전 보간 (lerp/slerp를 사용하여 뚝뚝 끊김 방지)
    pData.model.position.lerp(pData.targetPosition, 0.15);
    pData.model.quaternion.slerp(pData.targetQuaternion, 0.15);

    // 2. 물리 바디 위치도 모델에 맞춰 업데이트 (충돌 판정용)
    pData.chassisBody.position.copy(pData.model.position);
    pData.chassisBody.quaternion.copy(pData.model.quaternion);

    // 3. 바퀴 위치/회전 업데이트
    if (pData.wheels && pData.wheelHolders && pData.wheels.length > 0) {
        for (let i = 0; i < pData.wheels.length; i++) {
            const wheelData = pData.wheels[i];
            const wheelMesh = pData.wheelHolders[i];
            if (wheelMesh && wheelData) {
                wheelMesh.position.set(wheelData.position.x, wheelData.position.y, wheelData.position.z);
                wheelMesh.quaternion.set(wheelData.quaternion.x, wheelData.quaternion.y, wheelData.quaternion.z, wheelData.quaternion.w);
            }
        }
    }
}
    
    // 속도 + RPM + 기어 UI 표시
hud.textContent = `속도: ${getSpeedKmH().toFixed(1)} km/h | RPM: ${Math.floor(rpm)} | 기어: ${currentGear}`;
      // 카메라 따라가기
const carPos = interpolatedCarPosition; // 보간된 차량 위치 사용

if (cameraMode === 'third') {
  updateCamera();
} else if (cameraMode === 'first') {
  updateFirstPersonCamera();
} else {
  const desiredX = carPos.x + camDistance * Math.sin(camElevation) * Math.sin(camAzimuth);
  const desiredY = carPos.y + camDistance * Math.cos(camElevation);
  const desiredZ = carPos.z + camDistance * Math.sin(camElevation) * Math.cos(camAzimuth);
  
  // 쿠션감(lerp) 제거 -> 위치 및 시선 즉시 100% 동기화 (두두둑 거림 원천 차단)
  camera.position.set(desiredX, desiredY, desiredZ);
  camera.lookAt(carPos);
}

      // 타이머 업데이트
      updateTimer();

      renderer.render(scene, camera);
    }
      
  async function startGame(modelName = 'GrandeurIG', color = '#ffffff', nickname) {
  currentCarModel = modelName;
  socket.emit('joinGame', {
    nickname: nickname,
    carModel: modelName,
    carColor: color
  });

  switch (modelName) {
    case 'GrandeurIG':
      carModel = createGrandeurIGCarDetailed(color); // 동기, await 불필요
      break;
    case 'SportsCar':
      carModel = await createSportsCar(color); // ← await 필수
      break;
    case 'SUV':
      carModel = await createSUVCar(color); // ← await 추가 필요
      break;
     case 'McLarenP1':
        carModel = await createMcLarenP1(color);
        break;
    default:
      carModel = createGrandeurIGCarDetailed(color);
  }

  scene.add(carModel);
  wheelHolders.forEach(h => scene.add(h));

  // 물리 바디 보간용 초기값 설정
  chassisBody.previousPosition = new THREE.Vector3(chassisBody.position.x, chassisBody.position.y, chassisBody.position.z);
  chassisBody.previousQuaternion = new THREE.Quaternion(chassisBody.quaternion.x, chassisBody.quaternion.y, chassisBody.quaternion.z, chassisBody.quaternion.w);

  startTimer();
  updateGearDisplay();
  animate();
}
  
</script>
