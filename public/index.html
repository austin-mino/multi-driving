camera.position.set(0, 300, 500);

    // 자유 카메라 각도 변수 (구면좌표)
// 초기 각도 설정
let camAzimuth = Math.PI;       // 좌우 회전 (0~2PI)
let camElevation = Math.PI / 6; // 위아래 회전 (0~PI, 0:위, PI:아래)

// 카메라와 자동차 사이 거리
const camDistance = 15;

// 마우스/터치 드래그 상태 저장
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let camAzimuthStart = camAzimuth;
let camElevationStart = camElevation;

// 마우스 이벤트 핸들러
function onPointerDown(event) {
  if (cameraMode === 'free') {
    isDragging = true;
    dragStart.x = event.clientX;
    dragStart.y = event.clientY;
    camAzimuthStart = camAzimuth;
    camElevationStart = camElevation;
  }
}
function onPointerMove(event) {
  if (isDragging && cameraMode === 'free') {
    const deltaX = event.clientX - dragStart.x;
    const deltaY = event.clientY - dragStart.y;

    const rotationSpeed = 0.05;

    camAzimuth = camAzimuthStart - deltaX * rotationSpeed;
    camElevation = camElevationStart - deltaY * rotationSpeed;

    camElevation = Math.min(Math.max(camElevation, 0.1), Math.PI - 0.1);
  }
}
  
function onPointerUp(event) {
  isDragging = false;
}

// 터치 이벤트도 동일하게 처리
renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup', onPointerUp);
renderer.domElement.addEventListener('pointerleave', onPointerUp);
renderer.domElement.addEventListener('touchcancel', onPointerUp);

document.getElementById('btnReset').addEventListener('click', resetCar);
window.addEventListener('keydown', e => {

function resetCar() {
  // 위치는 그대로, 높이 약간 위로
  const pos = chassisBody.position;
  chassisBody.position.set(pos.x, pos.y + 1.5, pos.z);

  // 회전 초기화
  const yRot = getYRotation(chassisBody.quaternion);
  chassisBody.quaternion.setFromEuler(0, yRot, 0);

  // 속도 초기화
  chassisBody.velocity.set(0, 0, 0);
  chassisBody.angularVelocity.set(0, 0, 0);
}

// 쿼터니언에서 y축 회전값 추출
function getYRotation(q) {
  const siny_cosp = 2 * (q.w * q.y + q.z * q.x);
  const cosy_cosp = 1 - 2 * (q.y * q.y + q.z * q.z);
  return Math.atan2(siny_cosp, cosy_cosp);
}

// 1. 물리 월드 생성
const world = new CANNON.World({
  gravity: new CANNON.Vec3(0, -9.82, 0),
});

// 마찰 재질 설정
const groundMaterial = new CANNON.Material("groundMaterial");
const wheelMaterial = new CANNON.Material("wheelMaterial");

const contactMaterial = new CANNON.ContactMaterial(groundMaterial, wheelMaterial, {
  friction: 1.2,
  restitution: 0.0,
  contactEquationStiffness: 1e8,
  contactEquationRelaxation: 3,
});
world.addContactMaterial(contactMaterial);

// ─── 안개 ────────────────────────────────────
scene.fog = new THREE.Fog(0x87ceeb, 200, 800);
scene.background = new THREE.Color(0x87ceeb);

// ─── 조명 ─────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff5e0, 1.4);
sun.position.set(200, 400, 100);
sun.castShadow = true;
sun.shadow.mapSize.width = 512;
sun.shadow.mapSize.height = 512;
sun.shadow.camera.left = -300;
sun.shadow.camera.right = 300;
sun.shadow.camera.top = 300;
sun.shadow.camera.bottom = -300;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x88aacc, 0.6));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x4a7a3a, 0.5));

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

// ─── 캔버스 텍스처 생성 함수 ───────────────────────────────
function makeAsphaltTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 4000; i++) {
  const v = 12 + Math.random() * 10 | 0;
    ctx.fillStyle = `rgb(${v},${v},${v})`;
    ctx.fillRect(Math.random() * 256, Math.random() * 256, 1 + Math.random() * 2, 1);
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(60, 60);
  return t;
}

function makeSidewalkTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#888888';
  ctx.fillRect(0, 0, 128, 128);
  ctx.strokeStyle = '#707070';
  ctx.lineWidth = 1.5;
  for (let i = 0; i <= 128; i += 16) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 128); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(128, i); ctx.stroke();
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(5, 5);
  return t;
}

function makeBuildingTexture(hexColor, floors = 10, cols = 5) {
  const w = 256, h = 512;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const r = (hexColor >> 16) & 0xff;
  const g = (hexColor >> 8) & 0xff;
  const b = hexColor & 0xff;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, w, h);
  const fh = h / floors, cw = w / cols;
  for (let f = 0; f < floors; f++) {
    for (let col = 0; col < cols; col++) {
      const lit = Math.random() > 0.28;
      ctx.fillStyle = lit ? 'rgba(255,240,160,0.92)' : 'rgba(15,25,45,0.88)';
      ctx.fillRect(col * cw + cw * 0.12, f * fh + fh * 0.12, cw * 0.76, fh * 0.58);
      // 창문 테두리
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(col * cw + cw * 0.12, f * fh + fh * 0.12, cw * 0.76, fh * 0.58);
    }
  }
  return new THREE.CanvasTexture(c);
}

const asphaltTex = makeAsphaltTexture();
const sidewalkTex = makeSidewalkTexture();

// ─── 물리 바닥 ─────────────────────────────────────────────
const floorBody = new CANNON.Body({
  mass: 0,
  shape: new CANNON.Box(new CANNON.Vec3(10000, 5, 10000)),
  position: new CANNON.Vec3(0, -10, 0),
});
floorBody.material = groundMaterial;
world.addBody(floorBody);

// ─── 시각 바닥 (아스팔트) ──────────────────────────────────
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(10000, 10000),
  new THREE.MeshStandardMaterial({ map: asphaltTex, roughness: 0.95 })
);
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.position.y = -5;
floorMesh.receiveShadow = true;
scene.add(floorMesh);

// ─── 도시 설정 ─────────────────────────────────────────────
const BLOCK_SIZE = 100;
const ROAD_WIDTH = 20;
const GRID_COUNT = 4;

const roadGroup = new THREE.Group();
const buildingGroup = new THREE.Group();
const parkGroup = new THREE.Group();
scene.add(roadGroup, buildingGroup, parkGroup);

// 차선 재질 (공유)
const laneMat   = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
const yellowMat = new THREE.MeshStandardMaterial({ color: 0xffdd00, roughness: 0.8 });

function seededRandom(seed) {
  const x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}
let seedCounter = 0;
function rng() { return seededRandom(++seedCounter); }

// ─── 블록 생성 루프 ────────────────────────────────────────
const buildingPalette = [
  0x2a3a4a, 0x3a2e2c, 0x2c3a2c, 0x4a3c30, 0x2e3440,
  0x3a3020, 0x202e20, 0x302020, 0x303840, 0x253038,
  0x352c28, 0x1e2c36, 0x2a2a20, 0x301e1e, 0x243028
];

  const MAX_LIGHTS = 30;
let streetLightCount = 0;

  
for (let i = -GRID_COUNT; i <= GRID_COUNT; i++) {
  for (let j = -GRID_COUNT; j <= GRID_COUNT; j++) {
    const x = i * BLOCK_SIZE;
    const z = j * BLOCK_SIZE;
    createSidewalk(x, z);
    addLaneMarkings(x, z);
    if (i % 2 === 0 && j % 2 === 0) addCrosswalk(x, z);
    const isPark = rng() < 0.12;
    if (isPark) createPark(x, z);
    else createBuilding(x, z);
  }
}

// ─── 보도 + 연석 ───────────────────────────────────────────
function createSidewalk(x, z) {
  const size = BLOCK_SIZE - ROAD_WIDTH;

  const swMesh = new THREE.Mesh(
    new THREE.BoxGeometry(size, 0.35, size),
    new THREE.MeshStandardMaterial({ map: sidewalkTex, roughness: 0.9 })
  );
  swMesh.position.set(x, -4.82, z);
  swMesh.receiveShadow = true;
  roadGroup.add(swMesh);

  // 연석
  const curbMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.7 });
  const curbH = new THREE.BoxGeometry(size + 0.5, 0.35, 0.5);
  const curbV = new THREE.BoxGeometry(0.5, 0.35, size);
  for (const s of [-1, 1]) {
    const ch = new THREE.Mesh(curbH, curbMat);
    ch.position.set(x, -4.87, z + s * (size / 2));
    roadGroup.add(ch);
    const cv = new THREE.Mesh(curbV, curbMat);
    cv.position.set(x + s * (size / 2), -4.87, z);
    roadGroup.add(cv);
  }
}

// ─── 차선 표시 ─────────────────────────────────────────────
function addLaneMarkings(x, z) {
  // 중앙선 (노란 점선)
  for (let d = -BLOCK_SIZE / 2 + 8; d < BLOCK_SIZE / 2; d += 18) {
    const mz = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.02, 9), yellowMat);
    mz.position.set(x, -4.96, z + d);
    roadGroup.add(mz);
    const mx = new THREE.Mesh(new THREE.BoxGeometry(9, 0.02, 0.35), yellowMat);
    mx.position.set(x + d, -4.96, z);
    roadGroup.add(mx);
  }
}

// ─── 횡단보도 ──────────────────────────────────────────────
function addCrosswalk(x, z) {
  const half = BLOCK_SIZE / 2;
  const stripeW = 1.6;
  const stripeLen = ROAD_WIDTH * 0.85;
  const count = 5;
  const totalW = count * stripeW * 2;
  const startOff = -totalW / 2 + stripeW / 2;

  for (let i = 0; i < count; i++) {
    const off = startOff + i * stripeW * 2;
    // 위쪽 횡단보도
    const s1 = new THREE.Mesh(new THREE.BoxGeometry(stripeW, 0.02, stripeLen), laneMat);
    s1.position.set(x + off, -4.96, z - half + stripeLen / 2 + 1);
    roadGroup.add(s1);
    // 아래쪽 횡단보도
    const s2 = s1.clone();
    s2.position.z = z + half - stripeLen / 2 - 1;
    roadGroup.add(s2);
    // 왼쪽 횡단보도
    const s3 = new THREE.Mesh(new THREE.BoxGeometry(stripeLen, 0.02, stripeW), laneMat);
    s3.position.set(x - half + stripeLen / 2 + 1, -4.96, z + off);
    roadGroup.add(s3);
    // 오른쪽 횡단보도
    const s4 = s3.clone();
    s4.position.x = x + half - stripeLen / 2 - 1;
    roadGroup.add(s4);
  }
}

// ─── 건물 생성 ─────────────────────────────────────────────

function createBuilding(x, z) {
  const maxArea = BLOCK_SIZE - ROAD_WIDTH - 8;
  const w = 22 + rng() * (maxArea - 22);
  const d = 22 + rng() * (maxArea - 22);
  const h = 25 + rng() * 130;
  const baseColor = buildingPalette[Math.floor(rng() * buildingPalette.length)];

  const buildingTexPool = buildingPalette.map(color =>
  makeBuildingTexture(color, 10, 5)
);
  const tex = buildingTexPool[Math.floor(rng() * buildingTexPool.length)];
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.7, metalness: 0.1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, -5 + h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  buildingGroup.add(mesh);

  // 옥상 디테일
  addRooftop(x, z, w, d, h);

  // 물리
  const body = new CANNON.Body({ mass: 0 });
  body.addShape(new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2)));
  body.position.set(x, -5 + h / 2, z);
  world.addBody(body);

  addStreetProps(x, z, w, d);
}

// ─── 옥상 디테일 ───────────────────────────────────────────
function addRooftop(x, z, w, d, h) {
  const roofY = -5 + h;
  const grayMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });

  // 에어컨 실외기
  for (let i = 0; i < 2 + Math.floor(rng() * 3); i++) {

    const stair = new THREE.Mesh(
      new THREE.BoxGeometry(4 + rng() * 3, 3 + rng() * 2, 4 + rng() * 3),

  if (rng() > 0.65) {
    const tankMat = new THREE.MeshStandardMaterial({ color: 0x8b6010, roughness: 0.7 });
    const tank = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 2.5, 10), tankMat);
    const tx = x + (rng() - 0.5) * w * 0.5;
    const tz = z + (rng() - 0.5) * d * 0.5;
    tank.position.set(tx, roofY + 1.25, tz);
    buildingGroup.add(tank);
    // 지지대
    const legMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2;
      const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.8, 4), legMat);
      leg.position.set(tx + Math.cos(a) * 0.9, roofY + 0.6, tz + Math.sin(a) * 0.9);
      buildingGroup.add(leg);
    }
  }
}

function createPark(x, z) {
  const size = BLOCK_SIZE - ROAD_WIDTH - 2;

  // 잔디
  const grassC = document.createElement('canvas');
  grassC.width = grassC.height = 128;
  const gc = grassC.getContext('2d');
  gc.fillStyle = '#1a4020';
  gc.fillRect(0, 0, 128, 128);
  for (let i = 0; i < 800; i++) {
    const v = 30 + Math.random() * 35 | 0;
    gc.fillStyle = `rgb(${v},${35 + Math.random() * 30 | 0},${v})`;
    gc.fillRect(Math.random() * 128, Math.random() * 128, 2, 2);
  }
  const grassTex = new THREE.CanvasTexture(grassC);
  grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
  grassTex.repeat.set(4, 4);

  const grass = new THREE.Mesh(
    new THREE.PlaneGeometry(size, size),
    new THREE.MeshStandardMaterial({ map: grassTex, roughness: 0.95 })
  );
  grass.rotation.x = -Math.PI / 2;
  grass.position.set(x, -4.83, z);
  grass.receiveShadow = true;
  parkGroup.add(grass);

  // 산책로 (십자 경로)
  const pathMat = new THREE.MeshStandardMaterial({ color: 0xc8a878, roughness: 0.9 });
  const path1 = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.02, size), pathMat);
  path1.position.set(x, -4.82, z);
  parkGroup.add(path1);
  const path2 = new THREE.Mesh(new THREE.BoxGeometry(size, 0.02, 3.5), pathMat);
  path2.position.set(x, -4.82, z);
  parkGroup.add(path2);

  // 공원 벤치
  const benchMat = new THREE.MeshStandardMaterial({ color: 0x8b6030, roughness: 0.8 });
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + Math.PI / 4;
    const bx = x + Math.cos(a) * 12, bz = z + Math.sin(a) * 12;
    const seat = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.15, 0.65), benchMat);
    seat.position.set(bx, -4.74, bz);
    seat.rotation.y = a;
    parkGroup.add(seat);
    const back = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.55, 0.12), benchMat);
    back.position.set(bx + Math.cos(a + Math.PI / 2) * 0.3, -4.45, bz + Math.sin(a + Math.PI / 2) * 0.3);
    back.rotation.y = a;
    parkGroup.add(back);
  }

  // 공원 나무
  for (let i = 0; i < 8; i++) {
    const tx = x + (rng() - 0.5) * (size - 12);
    const tz = z + (rng() - 0.5) * (size - 12);
    createTree(tx, tz);
  }
}

  function createAudiA7(color = '#ffffff') {
  return new Promise((resolve) => {
   gltfLoader.load(
  'https://corsproxy.io/?https://github.com/austin-mino/multi-driving/releases/download/publish/audi_a7_55_tfsi.glb',
      (gltf) => {
        const car = gltf.scene;

        car.traverse((child) => {
          if (!child.isMesh) return;
          child.castShadow = true;
          child.receiveShadow = true;

          if (child.name.toLowerCase().includes('body') ||
              child.name.toLowerCase().includes('paint')) {
            child.material = child.material.clone();
            child.material.color.set(color);
            child.name = 'MainBody';
          }
        });

       car.scale.set(2.5, 2.5, 2.5);
       car.rotation.y = Math.PI;
       carVisualOffsetY = -0.8;

        resolve(car);
      },
      undefined,
      (err) => {
        console.error('Audi A7 로드 실패:', err);
        resolve(createGrandeurIGCarDetailed(color));
      }
    );
  });
}

function createSportsCar(color = '#ffffff') {
  return new Promise((resolve) => {
    gltfLoader.load(
      'https://threejs.org/examples/models/gltf/ferrari.glb',
      (gltf) => {
        const car = gltf.scene;

        car.traverse((child) => {
          if (!child.isMesh) return;

          if (child.name === 'body') {
            child.material = new THREE.MeshStandardMaterial({
              color: color,
              metalness: 0.8,
              roughness: 0.2,
            });
            child.name = 'MainBody'; // 멀티플레이 색상 동기화용
          } else if (child.name === 'glass') {
            child.material = new THREE.MeshStandardMaterial({
              color: 0x223344,
              transparent: true,
              opacity: 0.4,
              roughness: 0.05,
            });
          } else if (child.name.startsWith('rim')) {
            child.material = new THREE.MeshStandardMaterial({
              color: 0xcccccc,
              metalness: 0.9,
              roughness: 0.1,
            });
          }
          child.castShadow = true;
          child.receiveShadow = true;
        });

        car.scale.set(2.5, 2.5, 2.5);
        car.rotation.y = Math.PI;
        carVisualOffsetY = -0.8;

        resolve(car);
      },
      undefined,
      (err) => {
        console.error('Ferrari 모델 로드 실패, 기본 차로 대체:', err);
        resolve(createGrandeurIGCarDetailed(color)); // 실패 시 대체
      }
    );
  });
}

    // 기어 상태와 UI 업데이트 함수
    const maxEngineForce = 6000;
    const maxBrakeForce = 400;
    const maxSteerVal = Math.PI / 16;
    let engineForce = 0;
    let steeringValue = 0;

    function updateGearDisplay() {
      gearDisplay.textContent = `기어: ${gearState}`;
      const colorMap = { P: '#00ffff', R: '#ff5555', N: '#ffff55', D: '#55ff55' };

// 속도 측정 (m/s -> km/h)
    function getSpeedKmH() {
      const velocity = chassisBody.velocity;
      return velocity.length() * 3.6;
    }
  
 function calculateRPM(speed, delta) {
  // 변속 중: RPM 자연스럽게 하강
  if (isShifting) {
    rpm -= 2000 * delta;
    return Math.max(idleRPM, rpm);
  }

  if (input.accel) {
    // 핸드브레이크 중이면 조향 억제 없음
    const steerFactor = input.handbrake
      ? 1.0
      : Math.max(0.4, 1.0 - Math.abs(steeringValue) * 4.0);

    // 저단(1.8)일수록 RPM 빠르게, 고단(1.0)일수록 느리게
// 변경 - 4500 이하는 빠르게, 4500 이상은 천천히
const rpmThreshold = 2618;
const rpmFactor = rpm < rpmThreshold ? 1.0 : 0.3; // 4500 넘으면 30% 속도로
rpm += rpmRiseSpeed * delta * steerFactor * gearRatios[currentGear] * rpmFactor;
  } else {
    // 엑셀 안 밟으면 RPM 하강
    rpm -= 2500 * delta;
  }

  // 속도 기반 RPM 아주 약하게 혼합
  // 커브 시 속도 떨어지면 RPM도 살짝 내려옴
  // 고단에서 RPM 끌어올리는 부작용 최소화 (0.02)
  const wheelRadius = 0.65;
  const wheelCircumference = 2 * Math.PI * wheelRadius;
  const wheelRPM = (speed / 3.6) / wheelCircumference * 60;
  const speedBasedRPM = wheelRPM * gearRatios[currentGear] * finalDrive;

  // 핸드브레이크 중이면 속도 반영 완전히 끊음 (드리프트 중 RPM 독립)
  const blend = input.handbrake ? 0.08 : 0.02;
  rpm = rpm * (1 - blend) + speedBasedRPM * blend;

  return Math.max(idleRPM, Math.min(rpm, maxRPM));
}
  
function updateGearAuto(delta) {
  if (isShifting) {
    shiftTimer -= delta;
    if (shiftTimer <= 0) isShifting = false;
    return;
  }

  // 업시프트: RPM이 한계에 도달하면 다음 기어로
  if (input.accel && rpm >= shiftUpRPM && currentGear < maxGear) {
    currentGear++;
    rpm *= 0.62; // 업시프트 시 RPM 드롭
    isShifting = true;
    shiftTimer = shiftDelay;
  }

  // 다운시프트: 가속 없고 RPM 낮으면
  if (!input.accel && rpm < shiftDownRPM && currentGear > 1) {
    currentGear--;
    rpm *= 1.35; // 다운시프트 시 RPM 약간 올라감
    isShifting = true;
    shiftTimer = shiftDelay * 0.5;
  }
}
    // 차량 조향, 가속, 브레이크 처리
function updateVehicleControls(delta) {

 const speed = getSpeedKmH();

  // 조향
  const steerSpeed = 0.004;
  const returnSpeed = 0.016;

  if (input.left) {
    steeringValue = Math.max(steeringValue - steerSpeed, -maxSteerVal);
  } else if (input.right) {
    steeringValue = Math.min(steeringValue + steerSpeed, maxSteerVal);
  } else {
  if (steeringValue > 0)
    steeringValue = Math.max(steeringValue - returnSpeed, 0);

  else if (steeringValue < 0)
    steeringValue = Math.min(steeringValue + returnSpeed, 0);
}

  vehicle.setSteeringValue(steeringValue, 0);
  vehicle.setSteeringValue(steeringValue, 1);
  vehicle.setSteeringValue(0, 2);
  vehicle.setSteeringValue(0, 3);

  // 엔진 힘 초기화
engineForce = 0;

// 기어별 처리
  if (gearState === 'D') {
  rpm = calculateRPM(speed, delta);
  updateGearAuto(delta);

  if (input.accel && !isShifting) {
    const rpmFactor = rpm / maxRPM;

    let torqueCurve;
    if (rpmFactor < 0.25) {
      torqueCurve = 0.4 + rpmFactor * 2.4;
    } else if (rpmFactor < 0.75) {
      torqueCurve = 1.0;
    } else {
      torqueCurve = 1.0 - (rpmFactor - 0.75) * 1.2;
    }

const gearRatio = gearRatios[currentGear] * finalDrive;
const torque = maxEngineForce * torqueCurve / gearRatios[currentGear];
engineForce = Math.min(torque, maxEngineForce * 0.9);

const drag = 0.003 * speed * speed;
engineForce -= drag;
engineForce = Math.max(-8000, Math.min(engineForce, 8000));

  } else if (isShifting) {
    engineForce = 0;
  }

  applyBrake(input.brake ? maxBrakeForce : 0);
}
else if (gearState === 'R') {
  if (input.accel) engineForce = -maxEngineForce * 0.6;
  if (input.brake) applyBrake(maxBrakeForce);
  else applyBrake(0);

} else if (gearState === 'N') {
  applyBrake(input.brake ? maxBrakeForce : 0);

} else if (gearState === 'P') {
  applyBrake(maxBrakeForce * 1.5);
}


// 마지막 (이건 항상 맨 끝)
vehicle.applyEngineForce(engineForce, 2);
vehicle.applyEngineForce(engineForce, 3);
    
  
   // 사이드 브레이크 드리프트
let handbrakeActive = false;

if (input.handbrake) {
  const speed = chassisBody.velocity.length();

  // 방향 + 초기 킥
  if (!handbrakeActive) {
    chassisBody.angularVelocity.y -= steeringValue * speed * 0.11;
    handbrakeActive = true;
  }

  // 뒷바퀴 잠금
  vehicle.setBrake(70, 2);
  vehicle.setBrake(70, 3);

  vehicle.wheelInfos[2].frictionSlip = 0.25;
  vehicle.wheelInfos[3].frictionSlip = 0.25;

  // 회전 유지 (약하게)
  chassisBody.angularVelocity.y -= steeringValue * speed * 0.008;

  // 회전 제한
  chassisBody.angularVelocity.y *= 0.88;

} else {
  handbrakeActive = false;

  vehicle.setBrake(0, 2);
  vehicle.setBrake(0, 3);

  vehicle.wheelInfos[2].frictionSlip = 5.5;
  vehicle.wheelInfos[3].frictionSlip = 5.5;
}
 }

   function updateCamera() {
  const carPos = carModel.position.clone();

  // 회전만 적용 (스케일 제외)
  const offset = new THREE.Vector3(0, 7, 15);
  offset.applyQuaternion(carModel.quaternion);

  const targetPos = carPos.clone().add(offset);
  camera.position.lerp(targetPos, 0.1);
  camera.lookAt(carPos);
}

  function updateFirstPersonCamera() {
  // 운전석 위치 (차 중심 기준 앞쪽, 살짝 왼쪽, 위)
  const offset = new THREE.Vector3(-0.85, 2.5, -0.4);
  offset.applyQuaternion(carModel.quaternion);

  camera.position.copy(carModel.position).add(offset);

  // 차의 전진 방향으로 시선 고정
  const forward = new THREE.Vector3(0, 0, -1);
  forward.applyQuaternion(carModel.quaternion);

  const lookAt = camera.position.clone().add(forward.multiplyScalar(20));
  camera.lookAt(lookAt);
}

  let loadedFont = null;
  
function loadFontAsync() {
  return new Promise((resolve, reject) => {
    if (loadedFont) {
      resolve(loadedFont);
    } else {
      fontLoader.load(
        'https://threejs.org/examples/fonts/helvetiker_regular.typeface.json',
        (font) => {
          loadedFont = font;
          resolve(font);
        },
        undefined,
        (err) => reject(err)
      );
    }
  });
}

// text를 받아서 Promise로 텍스쳐 메쉬를 반환하는 함수
async function createTextMesh(text) {
  const font = await loadFontAsync();

  const geometry = new TextGeometry(text, {
    font: font,
    size: 0.6,
    height: 0.1,
    curveSegments: 12,
  });

  const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
  const mesh = new THREE.Mesh(geometry, material);

  return mesh;
}

    vehicle.updateWheelTransform(i);
    const t = vehicle.wheelInfos[i].worldTransform;
    return {
      position: { x: t.position.x, y: t.position.y, z: t.position.z },
      quaternion: { x: t.quaternion.x, y: t.quaternion.y, z: t.quaternion.z, w: t.quaternion.w }
    };
  });

  socket.emit('updatePosition', {
    position: { x: chassisBody.position.x, y: chassisBody.position.y, z: chassisBody.position.z },
    rotation: { x: chassisBody.quaternion.x, y: chassisBody.quaternion.y, z: chassisBody.quaternion.z, w: chassisBody.quaternion.w },
    gear: gearState,
    wheels
  });
}

];
for (let i = 0; i < 4; i++) {

// 충돌 물리 바디 생성

const otherChassisBody = new CANNON.Body({ mass: 1200 });
otherChassisBody.type = CANNON.Body.KINEMATIC;
otherChassisBody.addShape(otherChassisShape);
otherChassisBody.position.set(player.position.x, player.position.y, player.position.z);
otherChassisBody.collisionFilterGroup = 2;
otherChassisBody.collisionFilterMask = 1 | 2;
otherChassisBody.linearDamping = 0.2;

world.addBody(otherChassisBody);

otherPlayers[id] = {

    } else {
      const playerData = otherPlayers[id];

 for (const id of Object.keys(otherPlayers)) {

    function animate() {
       requestAnimationFrame(animate);

  // 물리 시뮬레이션 스텝
       const delta = clock.getDelta();

     updateVehicleControls(delta);
      
      world.step(1/60, delta, 5);

  carModel.quaternion.copy(chassisBody.quaternion);

      // 휠 mesh 위치/회전 업데이트
      for (let i = 0; i < vehicle.wheelInfos.length; i++) {
        vehicle.updateWheelTransform(i);
        const t = vehicle.wheelInfos[i].worldTransform;
        wheelHolders[i].position.copy(t.position);
        wheelHolders[i].quaternion.copy(t.quaternion);
      }

       // 상대방 차량 위치 보간 처리
  const now = performance.now();
 for (const id in otherPlayers) {
  const player = otherPlayers[id];
  const model = player.model;
  const targetPos = player.targetPosition;
  const targetQuat = player.targetQuaternion;

  if (targetPos && targetQuat) {
    model.position.copy(player.chassisBody.position);
model.quaternion.copy(player.chassisBody.quaternion);

    // 충돌 바디 위치 동기화
    if (player.chassisBody) {
     // 목표 위치까지의 차이
// 차량 모델 부드럽게 이동
model.position.lerp(targetPos, 0.2);
model.quaternion.slerp(targetQuat, 0.2);

// 충돌 바디는 모델 따라가기
player.chassisBody.position.copy(model.position);
player.chassisBody.quaternion.copy(model.quaternion);

// 회전 보간
player.chassisBody.quaternion.slerp(targetQuat, 0.2);
    }
  }
}

  const desiredZ = carPos.z + camDistance * Math.sin(camElevation) * Math.cos(camAzimuth);
  const desiredPos = new THREE.Vector3(desiredX, desiredY, desiredZ);
  camera.position.lerp(desiredPos, 0.2);
  const currentLookAt = new THREE.Vector3();
  camera.getWorldDirection(currentLookAt);
  const desiredLookAt = carPos.clone().sub(camera.position).normalize();
  currentLookAt.lerp(desiredLookAt, 0.2);
  camera.lookAt(camera.position.clone().add(currentLookAt));
}

  async function startGame(modelName = 'GrandeurIG', color = '#ffffff', nickname) {
  socket.emit('joinGame', {
    nickname: nickname,
    carModel: modelName,
    carColor: color
  });

  switch (modelName) {
    case 'GrandeurIG':
      carModel = createGrandeurIGCarDetailed(color); // 동기, await 불필요
      break;
    case 'SportsCar':
      carModel = await createSportsCar(color); // ← await 필수
      break;
    case 'AudiA7':
      carModel = await createAudiA7(color);
      break;
    case 'SUV':
      carModel = createSUVCar(color); // 동기, await 불필요
      break;
    default:
      carModel = createGrandeurIGCarDetailed(color);
  }

  scene.add(carModel);
  wheelHolders.forEach(h => scene.add(h));
  startTimer();
  updateGearDisplay();
  animate();
}
