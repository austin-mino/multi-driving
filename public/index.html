scene.background = new THREE.Color(0xa0a0a0);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
camera.position.set(0, 300, 500);

const renderer = new THREE.WebGLRenderer({ antialias: true });

document.body.appendChild(renderer.domElement);
    // 자유 카메라 각도 변수 (구면좌표)
// 초기 각도 설정

// 마우스/터치 드래그 상태 저장
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let camAzimuthStart = camAzimuth;
let camElevationStart = camElevation;

// 마우스 이벤트 핸들러
function onPointerDown(event) {
  if (cameraMode === 'free') {
    isDragging = true;
    dragStart.x = event.clientX;
    dragStart.y = event.clientY;
    camAzimuthStart = camAzimuth;
    camElevationStart = camElevation;
  }
}
function onPointerMove(event) {
  if (isDragging && cameraMode === 'free') {
    const deltaX = event.clientX - dragStart.x;
    const deltaY = event.clientY - dragStart.y;

    const rotationSpeed = 0.05;

    camAzimuth = camAzimuthStart - deltaX * rotationSpeed;
    camElevation = camElevationStart - deltaY * rotationSpeed;

    camElevation = Math.min(Math.max(camElevation, 0.1), Math.PI - 0.1);
  }
}
  
function onPointerUp(event) {
  isDragging = false;
}

// 터치 이벤트도 동일하게 처리
renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup', onPointerUp);

document.getElementById('btnReset').addEventListener('click', resetCar);
window.addEventListener('keydown', e => {

function resetCar() {
  // 위치는 그대로, 높이 약간 위로
  const pos = chassisBody.position;
  chassisBody.position.set(pos.x, pos.y + 1.5, pos.z);

  // 회전 초기화
  const yRot = getYRotation(chassisBody.quaternion);
  chassisBody.quaternion.setFromEuler(0, yRot, 0);

  // 속도 초기화
  chassisBody.velocity.set(0, 0, 0);
  chassisBody.angularVelocity.set(0, 0, 0);
}

// 쿼터니언에서 y축 회전값 추출
function getYRotation(q) {
  const siny_cosp = 2 * (q.w * q.y + q.z * q.x);
  const cosy_cosp = 1 - 2 * (q.y * q.y + q.z * q.z);
  return Math.atan2(siny_cosp, cosy_cosp);
}

// 1. 물리 월드 생성
const world = new CANNON.World({
  gravity: new CANNON.Vec3(0, -9.82, 0),
});

// 마찰 재질 설정
const groundMaterial = new CANNON.Material("groundMaterial");
const wheelMaterial = new CANNON.Material("wheelMaterial");

const contactMaterial = new CANNON.ContactMaterial(groundMaterial, wheelMaterial, {
  friction: 1.2,
  restitution: 0.0,
  contactEquationStiffness: 1e8,
  contactEquationRelaxation: 3,
});
world.addContactMaterial(contactMaterial);

// ─── 안개 ────────────────────────────────────
scene.fog = new THREE.Fog(0x87ceeb, 200, 800);
scene.background = new THREE.Color(0x87ceeb);

// ─── 조명 ─────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff5e0, 1.4);
sun.position.set(200, 400, 100);
sun.castShadow = true;
sun.shadow.mapSize.width = 512;
sun.shadow.mapSize.height = 512;
sun.shadow.camera.left = -300;
sun.shadow.camera.right = 300;
sun.shadow.camera.top = 300;
sun.shadow.camera.bottom = -300;
scene.add(sun);
scene.add(new THREE.AmbientLight(0x88aacc, 0.6));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x4a7a3a, 0.5));

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

// ─── 캔버스 텍스처 생성 함수 ───────────────────────────────
function makeAsphaltTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, 256, 256);
  for (let i = 0; i < 4000; i++) {
  const v = 12 + Math.random() * 10 | 0;
    ctx.fillStyle = `rgb(${v},${v},${v})`;
    ctx.fillRect(Math.random() * 256, Math.random() * 256, 1 + Math.random() * 2, 1);
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(60, 60);
  return t;
}

function makeSidewalkTexture() {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#888888';
  ctx.fillRect(0, 0, 128, 128);
  ctx.strokeStyle = '#707070';
  ctx.lineWidth = 1.5;
  for (let i = 0; i <= 128; i += 16) {
    ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 128); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(128, i); ctx.stroke();
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.repeat.set(5, 5);
  return t;
}

function makeBuildingTexture(hexColor, floors = 10, cols = 5) {
  const w = 256, h = 512;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  const r = (hexColor >> 16) & 0xff;
  const g = (hexColor >> 8) & 0xff;
  const b = hexColor & 0xff;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, w, h);
  const fh = h / floors, cw = w / cols;
  for (let f = 0; f < floors; f++) {
    for (let col = 0; col < cols; col++) {
      const lit = Math.random() > 0.28;
      ctx.fillStyle = lit ? 'rgba(255,240,160,0.92)' : 'rgba(15,25,45,0.88)';
      ctx.fillRect(col * cw + cw * 0.12, f * fh + fh * 0.12, cw * 0.76, fh * 0.58);
      // 창문 테두리
      ctx.strokeStyle = 'rgba(0,0,0,0.2)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(col * cw + cw * 0.12, f * fh + fh * 0.12, cw * 0.76, fh * 0.58);
    }
  }
  return new THREE.CanvasTexture(c);
}

const asphaltTex = makeAsphaltTexture();
const sidewalkTex = makeSidewalkTexture();

// ─── 물리 바닥 ─────────────────────────────────────────────
const floorBody = new CANNON.Body({
  mass: 0,
  shape: new CANNON.Box(new CANNON.Vec3(10000, 5, 10000)),
  position: new CANNON.Vec3(0, -10, 0),
});
floorBody.material = groundMaterial;
world.addBody(floorBody);

// ─── 시각 바닥 (아스팔트) ──────────────────────────────────
const floorMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(10000, 10000),
  new THREE.MeshStandardMaterial({ map: asphaltTex, roughness: 0.95 })
);
floorMesh.rotation.x = -Math.PI / 2;
floorMesh.position.y = -5;
floorMesh.receiveShadow = true;
scene.add(floorMesh);

// ─── 도시 설정 ─────────────────────────────────────────────
const BLOCK_SIZE = 100;
const ROAD_WIDTH = 20;
const GRID_COUNT = 4;

const roadGroup = new THREE.Group();
const buildingGroup = new THREE.Group();
const parkGroup = new THREE.Group();
scene.add(roadGroup, buildingGroup, parkGroup);

// 차선 재질 (공유)
const laneMat   = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
const yellowMat = new THREE.MeshStandardMaterial({ color: 0xffdd00, roughness: 0.8 });

function seededRandom(seed) {
  const x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}
let seedCounter = 0;
function rng() { return seededRandom(++seedCounter); }

// ─── 블록 생성 루프 ────────────────────────────────────────
const buildingPalette = [
  0x2a3a4a, 0x3a2e2c, 0x2c3a2c, 0x4a3c30, 0x2e3440,
  0x3a3020, 0x202e20, 0x302020, 0x303840, 0x253038,
  0x352c28, 0x1e2c36, 0x2a2a20, 0x301e1e, 0x243028
];

  const MAX_LIGHTS = 30;
let streetLightCount = 0;

  
for (let i = -GRID_COUNT; i <= GRID_COUNT; i++) {
  for (let j = -GRID_COUNT; j <= GRID_COUNT; j++) {
    const x = i * BLOCK_SIZE;
    const z = j * BLOCK_SIZE;
    createSidewalk(x, z);
    addLaneMarkings(x, z);
    if (i % 2 === 0 && j % 2 === 0) addCrosswalk(x, z);
    const isPark = rng() < 0.12;
    if (isPark) createPark(x, z);
    else createBuilding(x, z);
  }
}

// ─── 보도 + 연석 ───────────────────────────────────────────
function createSidewalk(x, z) {
  const size = BLOCK_SIZE - ROAD_WIDTH;

  const swMesh = new THREE.Mesh(
    new THREE.BoxGeometry(size, 0.35, size),
    new THREE.MeshStandardMaterial({ map: sidewalkTex, roughness: 0.9 })
  );
  swMesh.position.set(x, -4.82, z);
  swMesh.receiveShadow = true;
  roadGroup.add(swMesh);

  // 연석
  const curbMat = new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 0.7 });
  const curbH = new THREE.BoxGeometry(size + 0.5, 0.35, 0.5);
  const curbV = new THREE.BoxGeometry(0.5, 0.35, size);
  for (const s of [-1, 1]) {
    const ch = new THREE.Mesh(curbH, curbMat);
    ch.position.set(x, -4.87, z + s * (size / 2));
    roadGroup.add(ch);
    const cv = new THREE.Mesh(curbV, curbMat);
    cv.position.set(x + s * (size / 2), -4.87, z);
    roadGroup.add(cv);
  }
}

// ─── 차선 표시 ─────────────────────────────────────────────
function addLaneMarkings(x, z) {
  // 중앙선 (노란 점선)
  for (let d = -BLOCK_SIZE / 2 + 8; d < BLOCK_SIZE / 2; d += 18) {
    const mz = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.02, 9), yellowMat);
    mz.position.set(x, -4.96, z + d);
    roadGroup.add(mz);
    const mx = new THREE.Mesh(new THREE.BoxGeometry(9, 0.02, 0.35), yellowMat);
    mx.position.set(x + d, -4.96, z);
    roadGroup.add(mx);
  }
}

// ─── 횡단보도 ──────────────────────────────────────────────
function addCrosswalk(x, z) {
  const half = BLOCK_SIZE / 2;
  const stripeW = 1.6;
  const stripeLen = ROAD_WIDTH * 0.85;
  const count = 5;
  const totalW = count * stripeW * 2;
  const startOff = -totalW / 2 + stripeW / 2;

  for (let i = 0; i < count; i++) {
    const off = startOff + i * stripeW * 2;
    // 위쪽 횡단보도
    const s1 = new THREE.Mesh(new THREE.BoxGeometry(stripeW, 0.02, stripeLen), laneMat);
    s1.position.set(x + off, -4.96, z - half + stripeLen / 2 + 1);
    roadGroup.add(s1);
    // 아래쪽 횡단보도
    const s2 = s1.clone();
    s2.position.z = z + half - stripeLen / 2 - 1;
    roadGroup.add(s2);
    // 왼쪽 횡단보도
    const s3 = new THREE.Mesh(new THREE.BoxGeometry(stripeLen, 0.02, stripeW), laneMat);
    s3.position.set(x - half + stripeLen / 2 + 1, -4.96, z + off);
    roadGroup.add(s3);
    // 오른쪽 횡단보도
    const s4 = s3.clone();
    s4.position.x = x + half - stripeLen / 2 - 1;
    roadGroup.add(s4);
  }
}

// ─── 건물 생성 ─────────────────────────────────────────────

function createBuilding(x, z) {
  const maxArea = BLOCK_SIZE - ROAD_WIDTH - 8;
  const w = 22 + rng() * (maxArea - 22);
  const d = 22 + rng() * (maxArea - 22);
  const h = 25 + rng() * 130;
  const baseColor = buildingPalette[Math.floor(rng() * buildingPalette.length)];

  const buildingTexPool = buildingPalette.map(color =>
  makeBuildingTexture(color, 10, 5)
);
  const tex = buildingTexPool[Math.floor(rng() * buildingTexPool.length)];
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.7, metalness: 0.1 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, -5 + h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  buildingGroup.add(mesh);

  // 옥상 디테일
  addRooftop(x, z, w, d, h);

  // 물리
  const body = new CANNON.Body({ mass: 0 });
  body.addShape(new CANNON.Box(new CANNON.Vec3(w / 2, h / 2, d / 2)));
  body.position.set(x, -5 + h / 2, z);
  world.addBody(body);

  addStreetProps(x, z, w, d);
}

// ─── 옥상 디테일 ───────────────────────────────────────────
function addRooftop(x, z, w, d, h) {
  const roofY = -5 + h;
  const grayMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });

  // 에어컨 실외기
  for (let i = 0; i < 2 + Math.floor(rng() * 3); i++) {
    const ac = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.8, 1.2), grayMat);
    ac.position.set(x + (rng() - 0.5) * w * 0.7, roofY + 0.4, z + (rng() - 0.5) * d * 0.7);
    buildingGroup.add(ac);
  }

  // 계단실
  if (rng() > 0.5) {
    const stair = new THREE.Mesh(
      new THREE.BoxGeometry(4 + rng() * 3, 3 + rng() * 2, 4 + rng() * 3),
      new THREE.MeshStandardMaterial({ color: 0x707070, roughness: 0.9 })
    );
    stair.position.set(x + (rng() - 0.5) * w * 0.5, roofY + 1.5, z + (rng() - 0.5) * d * 0.5);
    buildingGroup.add(stair);
  }

  // 물탱크
  if (rng() > 0.65) {
    const tankMat = new THREE.MeshStandardMaterial({ color: 0x8b6010, roughness: 0.7 });
    const tank = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.2, 2.5, 10), tankMat);
    const tx = x + (rng() - 0.5) * w * 0.5;
    const tz = z + (rng() - 0.5) * d * 0.5;
    tank.position.set(tx, roofY + 1.25, tz);
    buildingGroup.add(tank);
    // 지지대
    const legMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2;
      const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 1.8, 4), legMat);
      leg.position.set(tx + Math.cos(a) * 0.9, roofY + 0.6, tz + Math.sin(a) * 0.9);
      buildingGroup.add(leg);
    }
  }
}

// ─── 공원 ──────────────────────────────────────────────────
function createPark(x, z) {
  const size = BLOCK_SIZE - ROAD_WIDTH - 2;

  // 잔디
  const grassC = document.createElement('canvas');
  grassC.width = grassC.height = 128;
  const gc = grassC.getContext('2d');
  gc.fillStyle = '#1a4020';
  gc.fillRect(0, 0, 128, 128);
  for (let i = 0; i < 800; i++) {
    const v = 30 + Math.random() * 35 | 0;
    gc.fillStyle = `rgb(${v},${35 + Math.random() * 30 | 0},${v})`;
    gc.fillRect(Math.random() * 128, Math.random() * 128, 2, 2);
  }
  const grassTex = new THREE.CanvasTexture(grassC);
  grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
  grassTex.repeat.set(4, 4);

  const grass = new THREE.Mesh(
    new THREE.PlaneGeometry(size, size),
    new THREE.MeshStandardMaterial({ map: grassTex, roughness: 0.95 })
  );
  grass.rotation.x = -Math.PI / 2;
  grass.position.set(x, -4.83, z);
  grass.receiveShadow = true;
  parkGroup.add(grass);

  // 산책로 (십자 경로)
  const pathMat = new THREE.MeshStandardMaterial({ color: 0xc8a878, roughness: 0.9 });
  const path1 = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.02, size), pathMat);
  path1.position.set(x, -4.82, z);
  parkGroup.add(path1);
  const path2 = new THREE.Mesh(new THREE.BoxGeometry(size, 0.02, 3.5), pathMat);
  path2.position.set(x, -4.82, z);
  parkGroup.add(path2);

  // 공원 벤치
  const benchMat = new THREE.MeshStandardMaterial({ color: 0x8b6030, roughness: 0.8 });
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2 + Math.PI / 4;
    const bx = x + Math.cos(a) * 12, bz = z + Math.sin(a) * 12;
    const seat = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.15, 0.65), benchMat);
    seat.position.set(bx, -4.74, bz);
    seat.rotation.y = a;
    parkGroup.add(seat);
    const back = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.55, 0.12), benchMat);
    back.position.set(bx + Math.cos(a + Math.PI / 2) * 0.3, -4.45, bz + Math.sin(a + Math.PI / 2) * 0.3);
    back.rotation.y = a;
    parkGroup.add(back);
  }

  // 공원 나무
  for (let i = 0; i < 8; i++) {
    const tx = x + (rng() - 0.5) * (size - 12);
    const tz = z + (rng() - 0.5) * (size - 12);
    createTree(tx, tz);
  }
}

// ─── 나무 (레이어드 콘) ─────────────────────────────────────
function createTree(x, z) {
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c3310, roughness: 0.9 });
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.28, 3.2, 7), trunkMat);
  trunk.position.set(x, -3.4, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const greens = [0x1a6b1a, 0x247a24, 0x2e9030];
  for (let i = 0; i < 3; i++) {
    const r = 2.2 - i * 0.4;
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(r, 1.8, 8),
      new THREE.MeshStandardMaterial({ color: greens[i], roughness: 0.85 })
    );
    cone.position.set(x, -1.6 + i * 1.4, z);
    cone.castShadow = true;
    scene.add(cone);
  }
}

function createSportsCar(color = '#ffffff') {
  return new Promise((resolve) => {
    gltfLoader.load(
      'https://threejs.org/examples/models/gltf/ferrari.glb',
      (gltf) => {
        const car = gltf.scene;
        steeringWheelNode = null; // 헨들 조정 초기화

        car.traverse((child) => {
          // 핸들은 Mesh가 아닐 수도 있으므로 isMesh 체크를 아래로 이동하거나 이름 체크를 먼저 합니다.
          if (child.name === 'steering_wheel') {
            steeringWheelNode = child;
          }

          if (!child.isMesh) return;
          
          if (child.name === 'body') {
            child.material = new THREE.MeshStandardMaterial({
              color: color,
              metalness: 0.8,
              roughness: 0.2,
            });
            child.name = 'MainBody'; // 멀티플레이 색상 동기화용
          } else if (child.name === 'glass') {
            child.material = new THREE.MeshStandardMaterial({
              color: 0x223344,
              transparent: true,
              opacity: 0.4,
              roughness: 0.05,
            });
          } else if (child.name.startsWith('rim')) {
            child.material = new THREE.MeshStandardMaterial({
              color: 0xcccccc,
              metalness: 0.9,
              roughness: 0.1,
            });
          }
          child.castShadow = true;
          child.receiveShadow = true;
        });

        car.scale.set(2.5, 2.5, 2.5);
        car.rotation.y = Math.PI;
     

        // ─── Ferrari 바퀴 노드 추출 ───────────────────────────────
        // 모델 내 바퀴 부모 노드: wheel_fl, wheel_fr, wheel_rl, wheel_rr
        // CANNON 인덱스: 0=FL(-x,+z), 1=FR(+x,+z), 2=RL(-x,-z), 3=RR(+x,-z)
        carWheelNodes = [null, null, null, null];
        car.traverse((child) => {
          if (child.name === 'wheel_fl') carWheelNodes[0] = child;
          else if (child.name === 'wheel_fr') carWheelNodes[1] = child;
          else if (child.name === 'wheel_rl') carWheelNodes[2] = child;
          else if (child.name === 'wheel_rr') carWheelNodes[3] = child;
        });
        // 초기 회전값 저장 (모델이 기본 회전을 가지고 있으므로)
        carWheelNodes.forEach((node) => {
          if (node) node.userData.baseQuaternion = node.quaternion.clone();
        });
        
        car.userData.wheelNodes = carWheelNodes;
        car.userData.steeringNode = steeringWheelNode;
        car.userData.modelName = 'SportsCar';
        car.userData.visualOffsetY = -0.8;
        car.userData.steeringNode = steeringWheelNode;
        
        resolve(car);
      },
      undefined,
      (err) => {
        console.error('Ferrari 모델 로드 실패, 기본 차로 대체:', err);
        resolve(createGrandeurIGCarDetailed(color)); // 실패 시 대체
      }
    );
  });
}

function createSUVCar(color = '#ffffff') {
  return new Promise((resolve) => {
    gltfLoader.load(
      'https://raw.githubusercontent.com/austin-mino/multi-driving/main/Range%20Rover%20Sports%202018%20(.GLB).glb',
      (gltf) => {
        const innerCar = gltf.scene;
        
 innerCar.traverse((child) => {
          if (!child.isMesh) return;

          child.castShadow = true;
          child.receiveShadow = true;

          // 차체 페인트만 색 변경
          if (child.material?.name?.trim() === 'Car Paint') {
            child.material = child.material.clone();

            child.material.color.set(color);

            // 원래 재질 느낌 유지
            child.material.metalness = 0.6;
            child.material.roughness = 0.4;

            child.material.needsUpdate = true;
          }
        });
 
       
        innerCar.position.x = 0.38;
        innerCar.rotation.y = Math.PI / 2;

        // wrapper = carModel (physics 쿼터니언 적용 대상)
        const wrapper = new THREE.Group();
        wrapper.add(innerCar);
        wrapper.scale.set(2.5, 2.5, 2.5);

        // ─── Range Rover 바퀴 노드 추출 ───────────────────────────
        carWheelNodes = [null, null, null, null];
        innerCar.traverse((child) => {
          const n = child.name.toUpperCase();
          // 더 넓은 범위의 이름 검색 (공백, 대소문자, 약어 대응)
          if ((n.includes('FL') || n.includes('FRONT_LEFT')) && n.includes('WHEEL')) carWheelNodes[0] = child;
          else if ((n.includes('FR') || n.includes('FRONT_RIGHT')) && n.includes('WHEEL')) carWheelNodes[1] = child;
          else if ((n.includes('BL') || n.includes('BACK_LEFT') || n.includes('RL')) && n.includes('WHEEL')) carWheelNodes[2] = child;
          else if ((n.includes('BR') || n.includes('BACK_RIGHT') || n.includes('RR')) && n.includes('WHEEL')) carWheelNodes[3] = child;
        });
        console.log('Range Rover 바퀴 노드:', carWheelNodes.map(n => n ? n.name : 'null'));
        carWheelNodes.forEach((node) => {
          if (node) {
              // SUV 바퀴 축 보정
              node.rotateZ(Math.PI * 2);
              // 데이터
              node.userData.baseQuaternion = node.quaternion.clone();
              // 애니메이션 간섭 방지
              node.matrixAutoUpdate = true;
          }
        });


        wrapper.userData.wheelNodes = carWheelNodes;
        wrapper.userData.modelName = 'SUV';
        wrapper.userData.visualOffsetY = -0.8;
        wrapper.userData.steeringNode = steeringWheelNode;
                          
        resolve(wrapper);
      },
      undefined,
      (err) => {
        console.error('Range Rover 로드 실패:', err);
        resolve(new THREE.Group());
      }
    );
  });
}

/* 폰티악(Pontiac Phoenix) 생성 함수 */
async function createPontiacPhoenix(color = '#ffffff') {
  return new Promise((resolve) => {
    const loader = new GLTFLoader();
    
    loader.load(
      'https://raw.githubusercontent.com/austin-mino/multi-driving/main/models/Pontiac%20Firebird/uploads_files_6012214_American+Muscle.glb', 
      (gltf) => {
        const car = gltf.scene;

        // 1. 불필요한 노드(Plane) 제거 및 그림자/색상 설정
        car.traverse((child) => {
          // 바닥(Plane) 제거
          if (child.name.toLowerCase().includes('plane')) {
            child.visible = false; 
            if (child.parent) child.parent.remove(child);
            return;
          }

          if (child.isMesh && child.material) {
            child.castShadow = true;
            child.receiveShadow = true;

            // 차체(Body) 색상 변경 로직
            const matName = child.material.name.toLowerCase();
            if (child.name.toLowerCase().includes('body') || matName.includes('body') || matName.includes('paint')) {
              child.material = child.material.clone();
              child.material.color.set(color);
              child.material.metalness = 0.8;
              child.material.roughness = 0.2;
              child.name = 'MainBody'; 
            }
          }
        });

        // 2. 크기 및 기본 방향 설정
        car.scale.set(3, 3, 3); 
        car.rotation.y = Math.PI; 

        // 중심점 재정렬
        const box = new THREE.Box3().setFromObject(car);
        const center = box.getCenter(new THREE.Vector3());
        car.position.x -= center.x;
        car.position.z -= center.z;
        car.position.y -= box.min.y;

        const carGroup = new THREE.Group();
        carGroup.add(car);

        // 3. 바퀴 노드 추출 및 설정 (CANNON 인덱스: 0=FL, 1=FR, 2=RL, 3=RR)
        const wheelNodes = [null, null, null, null];
        car.traverse((child) => {
          const n = child.name;
          if (n === 'Wheel_FL') { wheelNodes[0] = child; child.userData.side = 'L'; }
          else if (n === 'Wheel_FR') { wheelNodes[1] = child; child.userData.side = 'R'; }
          else if (n === 'Wheel_RL') { wheelNodes[2] = child; child.userData.side = 'L'; }
          else if (n === 'Wheel_RR') { wheelNodes[3] = child; child.userData.side = 'R'; }
        });

        wheelNodes.forEach((node) => {
          if (node) {
            node.userData.baseQuaternion = node.quaternion.clone();
            node.matrixAutoUpdate = true;
          }
        });

        // 4. 차량 데이터 저장
        carGroup.userData.wheelNodes = wheelNodes;
        carWheelNodes = wheelNodes; // 전역 변수 즉시 업데이트
        carGroup.userData.modelName = 'PontiacPhoenix';
        carGroup.userData.visualOffsetY = -0.5; 

        resolve(carGroup);
      },
      undefined,
      (error) => {
        console.error('Pontiac Phoenix 로드 실패:', error);
        resolve(createGrandeurIGCarDetailed(color)); 
      }
    );
  });
}

   function updateCamera() {
  const carPos = interpolatedCarPosition.clone();
  
  // 1. 기본 오프셋 설정 (차량 뒤쪽 위)
  const offset = new THREE.Vector3(0, 6, 14);
  
  // 2. 조향에 따른 카메라 쏠림 효과 (원심력 표현)
  // steeringValue가 왼쪽(-)이면 카메라는 오른쪽(+)으로 살짝 이동
  const steeringLean = -steeringValue * 5; 
  offset.x += steeringLean;
  
  // 3. 속도에 따른 거리 조절 (속도가 빠르면 카메라가 더 멀어짐)
  const speed = getSpeedKmH();
  const speedFactor = Math.min(speed / 200, 1);
  offset.z += speedFactor * 4;
  offset.y += speedFactor * 1.5;

  offset.applyQuaternion(interpolatedCarQuaternion);
  const targetPos = carPos.clone().add(offset);

  // 4. 부드러운 위치 보간 (너무 딱딱하지 않게)
  camera.position.lerp(targetPos, 0.15);
  
  // 5. 시선 보간 (차량의 약간 앞쪽을 바라보게 하여 더 역동적으로)
  const lookAtOffset = new THREE.Vector3(0, 1, -5);
  lookAtOffset.applyQuaternion(interpolatedCarQuaternion);
  const lookAtTarget = carPos.clone().add(lookAtOffset);
  
  // 현재 카메라가 보고 있는 방향에서 목표 방향으로 부드럽게 회전
  const currentLookAt = new THREE.Vector3();
  camera.getWorldDirection(currentLookAt);
  const targetLookAt = lookAtTarget.clone().sub(camera.position).normalize();
  
  camera.lookAt(lookAtTarget);
}

   function updateFirstPersonCamera() {
  // 차종별 운전석 위치
  let offset;
   if (currentCarModel === 'SUV') {
    offset = new THREE.Vector3(0, 3.3, -3.6); // Range Rover 운전석
  } else if (currentCarModel === 'SportsCar') {
    offset = new THREE.Vector3(-0.85, 2.5, -0.25); // Ferrari
  } else if (currentCarModel === 'McLarenP1') {
    offset = new THREE.Vector3(0, 0.5, -4); // mclaren
  } else if (currentCarModel === 'PontiacPhoenix') {
    offset = new THREE.Vector3(-0.85, 2.5, -0.25); // Pontiac Phoenix
  } else {
    offset = new THREE.Vector3(-0.85, 2.5, -0.4); // 그랜저 기본
  }


  // 1인칭 흔들림 효과 (G-Force 표현)
  const speed = getSpeedKmH();
  const speedFactor = speed / 100;
  const shake = Math.sin(Date.now() * 0.01) * 0.0021618 * speedFactor;
  offset.y += shake;
  offset.x += -steeringValue * 0.5; // 조향 시 몸이 쏠리는 효과

  offset.applyQuaternion(interpolatedCarQuaternion);
  camera.position.copy(interpolatedCarPosition).add(offset);

  const forward = new THREE.Vector3(0, 0, -1);
  // 시선도 조향 방향으로 살짝 미리 보게 함
  const lookRotation = interpolatedCarQuaternion.clone();
  const steeringQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), -steeringValue * 0.3);
  lookRotation.multiply(steeringQuat);
  
  forward.applyQuaternion(lookRotation);

  const lookAt = camera.position.clone().add(forward.multiplyScalar(20));
  camera.lookAt(lookAt);
}

function loadFontAsync() {
  return new Promise((resolve, reject) => {
    if (loadedFont) {
      resolve(loadedFont);
    } else {
      fontLoader.load(
        'https://threejs.org/examples/fonts/helvetiker_regular.typeface.json',
        (font) => {
          loadedFont = font;
          resolve(font);
        },
        undefined,
        (err) => reject(err)
      );
    }
  });
}

// text를 받아서 Promise로 텍스쳐 메쉬를 반환하는 함수
async function createTextMesh(text) {
  const font = await loadFontAsync();

  const geometry = new TextGeometry(text, {
    font: font,
    size: 0.6,
    height: 0.1,
    curveSegments: 12,
  });

  const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
  const mesh = new THREE.Mesh(geometry, material);

  return mesh;
}

    let finalModelQuat = finalQuat.clone();
    if (node.userData.side === 'L') {
      const LEFT_SIDE_INVERSION = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI);
      finalModelQuat.multiply(LEFT_SIDE_INVERSION);
    }
    node.quaternion.copy(finalModelQuat);

  } else if (currentCarModel.includes('SUV')) {  
    node.quaternion.copy(node.userData.baseQuaternion.clone().multiply(finalQuat));
  } else {
    node.quaternion.setFromEuler(euler);
  }
  
  // 강제 행렬 업데이트
  node.updateMatrix();
}
      }

       // 상대방 차량 위치 보간 처리
      
  const now = performance.now();
// 상대방 차량 위치 보간 처리
// 상대방 차량 위치 보간 처리
  for (const id in otherPlayers) {
    const pData = otherPlayers[id];
    
    // 로딩 중이거나 모델이 아직 없는 경우 건너뜀
    if (pData.loading || !pData.model) continue;

    // 1. 차체 위치/회전 보간 (lerp/slerp를 사용하여 뚝뚝 끊김 방지)
    const remoteOffset = pData.model.userData.visualOffsetY || 0;
    const visualTargetPos = pData.targetPosition.clone();
    visualTargetPos.y += remoteOffset;

    // 시각 모델을 부드럽게 이동 및 회전
    pData.model.position.lerp(visualTargetPos, 0.15);
    pData.model.quaternion.slerp(pData.targetQuaternion, 0.15);

    // 충돌용 물리 바디 업데이트
    pData.chassisBody.position.set(
        pData.model.position.x,
        pData.model.position.y - remoteOffset,
        pData.model.position.z
    );
    pData.chassisBody.quaternion.copy(pData.model.quaternion);

    // 3. 상대방 바퀴 강제 굴림 및 조향 동기화 
    if (pData.model.userData.wheelNodes) {
        if (!pData.lastPos) pData.lastPos = pData.model.position.clone();
        if (pData.accumulatedRoll === undefined) pData.accumulatedRoll = 0;
        
        const distance = pData.model.position.distanceTo(pData.lastPos);
        if (distance > 0.001) {
            const moveDir = new THREE.Vector3().subVectors(pData.model.position, pData.lastPos).normalize();
            const forwardDir = new THREE.Vector3(0, 0, 1).applyQuaternion(pData.model.quaternion).normalize();
            const direction = moveDir.dot(forwardDir) > 0 ? 1 : -1;
            pData.accumulatedRoll += distance * 2.8 * direction;
        }

        const wheels = pData.model.userData.wheelNodes;
        const steerAngle = pData.steeringValue || 0; 
        const remoteModelName = pData.model.userData.modelName || ''; // 상대방 차량 모델명 확인

        for (let i = 0; i < wheels.length; i++) {
            const wheel = wheels[i];
            if (!wheel) continue;
            
            if (remoteModelName.includes('SUV')) {
                // ─── [1] SUV (레인지로버) 전용 바퀴 정렬 로직 ───
                // 조향각 방향 반전 및 증폭 (내 차 SUV 로직과 동일하게)
                const visualSteering = (i === 0 || i === 1) ? -steerAngle * 2.6 : -steerAngle;
                
                const steerQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), visualSteering);
                const rollQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pData.accumulatedRoll);
                
                // 조향 성분과 구름 성분 결합
                const localTransform = new THREE.Quaternion().copy(steerQuat).multiply(rollQuat);
                
                // SUV 전용 축 보정 (-90도 회전)
                const correctionQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0));
                const finalTransform = localTransform.clone().multiply(correctionQuat);
                
                // ★ 중요: SUV는 곱하는 순서가 [baseQuaternion * 회전값] 이어야 옆으로 구르지 않습니다.
                if (wheel.userData.baseQuaternion) {
                    wheel.quaternion.copy(wheel.userData.baseQuaternion.clone().multiply(finalTransform));
                } else {
                    wheel.quaternion.copy(finalTransform);
                }

            } else if (remoteModelName.includes('McLarenP1')) {
                // ─── [2] 맥라렌 전용 바퀴 정렬 로직 ───
                const visualSteering = (i === 0 || i === 1) ? -steerAngle * 2.6 : 0;
                const steerQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), visualSteering);
                const rollQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pData.accumulatedRoll);
                
                const localTransform = new THREE.Quaternion().copy(steerQuat).multiply(rollQuat);
                const correctionQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0));
                let finalTransform = localTransform.clone().multiply(correctionQuat);
                
                if (wheel.userData.side === 'L') {
                    const LEFT_SIDE_INVERSION = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI);
                    finalTransform.multiply(LEFT_SIDE_INVERSION);
                }
                wheel.quaternion.copy(finalTransform);

                        } else if (remoteModelName.includes('PontiacPhoenix')) {
                // ─── [3] 폰티악 전용 바퀴 정렬 로직 (조향 및 반전 수정) ───
                const visualSteering = (i === 0 || i === 1) ? -steerAngle * 2.6 : 0;
                const steerQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), visualSteering);
                const rollQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pData.accumulatedRoll);
                
                const localTransform = new THREE.Quaternion().copy(steerQuat).multiply(rollQuat);
                // 폰티악 전용 복합 축 보정
                const correctionQuat = new THREE.Quaternion().setFromEuler(new THREE.Euler(-Math.PI / 2, -Math.PI / 2, 0));
                let finalTransform = localTransform.clone().multiply(correctionQuat);
                
                if (wheel.userData.side === 'L') {
                    const LEFT_SIDE_INVERSION = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), Math.PI);
                    finalTransform.multiply(LEFT_SIDE_INVERSION);
                }
                wheel.quaternion.copy(finalTransform);
            } else {
                // ─── [3] 일반 차량 로직 (그랜저, 스포츠카 등) ───
                const finalSteer = (i === 0 || i === 1) ? steerAngle * 2.6 : 0;
                const steerQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), -finalSteer);
                const rollQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pData.accumulatedRoll);

                const finalTransform = new THREE.Quaternion().copy(steerQuat).multiply(rollQuat);

                if (wheel.userData.baseQuaternion) {
                    wheel.quaternion.copy(finalTransform).multiply(wheel.userData.baseQuaternion);
                } else {
                    wheel.quaternion.copy(finalTransform);
                }
            }

            wheel.updateMatrix();
        } // 바퀴 loop 끝
        pData.lastPos.copy(pData.model.position);
    }
  } 


  // 속도 + RPM + 기어 UI 표시
  hud.textContent = `속도: ${getSpeedKmH().toFixed(1)} km/h | RPM: ${Math.floor(rpm)} | 기어: ${currentGear}`;
      // 카메라 따라가기
const carPos = interpolatedCarPosition; // 보간된 차량 위치 사용

if (cameraMode === 'third') {
  updateCamera();
} else if (cameraMode === 'first') {
  updateFirstPersonCamera();
} else {
  const desiredX = carPos.x + camDistance * Math.sin(camElevation) * Math.sin(camAzimuth);
  const desiredY = carPos.y + camDistance * Math.cos(camElevation);
  const desiredZ = carPos.z + camDistance * Math.sin(camElevation) * Math.cos(camAzimuth);
  
  // 쿠션감(lerp) 제거 -> 위치 및 시선 즉시 100% 동기화 (두두둑 거림 원천 차단)
  camera.position.set(desiredX, desiredY, desiredZ);
  camera.lookAt(carPos);
}

      // 타이머 업데이트
      updateTimer();

      renderer.render(scene, camera);
    }
      
  async function startGame(modelName = 'GrandeurIG', color = '#ffffff', nickname) {
  currentCarModel = modelName;
  socket.emit('joinGame', {
    nickname: nickname,
    carModel: modelName,
    carColor: color
  });

  switch (modelName) {
    case 'GrandeurIG':
      carModel = createGrandeurIGCarDetailed(color); // 동기, await 불필요
      break;
    case 'SportsCar':
      carModel = await createSportsCar(color); // ← await 필수
      break;
    case 'SUV':
      carModel = await createSUVCar(color); 
      break;
    case 'McLarenP1':
      carModel = await createMcLarenP1(color);
      break;
    case 'PontiacPhoenix':
      carModel = await createPontiacPhoenix(color);
      break;
    default:
      carModel = createGrandeurIGCarDetailed(color);
  }

  scene.add(carModel);
  // carModel.userData.wheelNodes가 이미 설정되어 있다면 전역 변수 carWheelNodes를 업데이트합니다.
  if (carModel.userData.wheelNodes) {
    carWheelNodes = carModel.userData.wheelNodes;
  } else {
    carModel.userData.wheelNodes = carWheelNodes;
  }
  carModel.userData.modelName = currentCarModel;
  wheelHolders.forEach(h => scene.add(h));
  carModel.userData.steeringNode = steeringWheelNode;

  // 물리 바디 보간용 초기값 설정
  chassisBody.previousPosition = new THREE.Vector3(chassisBody.position.x, chassisBody.position.y, chassisBody.position.z);
  chassisBody.previousQuaternion = new THREE.Quaternion(chassisBody.quaternion.x, chassisBody.quaternion.y, chassisBody.quaternion.z, chassisBody.quaternion.w);

  startTimer();
  updateGearDisplay();
  animate();
}
  
</script>
